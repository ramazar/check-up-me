<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedGO | Check-Up Me</title>
    
    <link href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700|Oswald:400,700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-blue: #73a3de;
            --accent-pink: #ff6b6b;
            --dark-blue: #2c3e50;
            --light-bg: #f4f7f9;
        }

        body {
            margin: 0;
            font-family: 'Roboto', sans-serif;
            background-color: var(--light-bg);
            color: var(--dark-blue);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Animation */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .main-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        .checkup-card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 500px;
            animation: fadeInUp 0.6s ease-out;
        }

        h2 {
            font-family: 'Oswald', sans-serif;
            text-align: center;
            margin-bottom: 30px;
            color: var(--primary-blue);
            letter-spacing: 1px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 10px;
            font-weight: 500;
        }

        /* Modern Radio Group */
        .gender-group {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
        }

        .gender-option {
            flex: 1;
            position: relative;
        }

        .gender-option input {
            position: absolute;
            opacity: 0;
            cursor: pointer;
        }

        .custom-radio {
            display: block;
            text-align: center;
            padding: 12px;
            border: 2px solid #e1e8ed;
            border-radius: 10px;
            transition: all 0.3s;
            cursor: pointer;
        }

        .gender-option input:checked + .custom-radio {
            border-color: var(--primary-blue);
            background-color: rgba(115, 163, 222, 0.1);
            color: var(--primary-blue);
            font-weight: bold;
        }

        /* Age Input */
        .age-input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e1e8ed;
            border-radius: 10px;
            box-sizing: border-box;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        .age-input:focus {
            outline: none;
            border-color: var(--primary-blue);
        }

        /* Next Button */
        .next-btn {
            display: block;
            width: 100%;
            padding: 18px;
            background-color: var(--primary-blue);
            color: white;
            text-align: center;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            font-size: 18px;
            transition: transform 0.3s, background-color 0.3s;
            box-shadow: 0 5px 15px rgba(115, 163, 222, 0.3);
            border: none;
            cursor: pointer;
        }

        .next-btn:hover {
            background-color: #5d8cc7;
            transform: translateY(-2px);
        }

        footer {
            background: var(--dark-blue);
            color: white;
            padding: 20px;
            text-align: center;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="checkup-card">
            <h2>TELL US ABOUT YOU</h2>
            
            <form id="checkupForm" action="Diagnose.html">
                <label>Select Gender</label>
                <div class="gender-group">
                    <label class="gender-option">
                        <input type="radio" name="gender" value="male" required>
                        <span class="custom-radio">Male</span>
                    </label>
                    <label class="gender-option">
                        <input type="radio" name="gender" value="female">
                        <span class="custom-radio">Female</span>
                    </label>
                </div>

                <div class="form-group">
                    <label for="age">Your Age</label>
                    <input type="number" id="age" class="age-input" placeholder="Enter age (e.g. 25)" min="1" max="120" required>
                </div>

                <button type="submit" class="next-btn">Next Step →</button>
            </form>
        </div>
    </div>

    <footer>
        <p>BETA v.0.1 #teensinai | Medical Prototype 2026</p>
    </footer>

    <script>
        // Simple validation before going to Diagnose.html
        document.getElementById('checkupForm').addEventListener('submit', function(e) {
            const age = document.getElementById('age').value;
            if (age < 1) {
                e.preventDefault();
                alert("Please enter a valid age.");
            }
        });
    </script>
</body>
</html>
